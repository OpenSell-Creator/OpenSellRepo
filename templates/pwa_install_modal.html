{% load static %}
<div class="pwa-install-modal" id="pwaInstallModal" aria-hidden="true" role="dialog" aria-labelledby="pwaModalTitle" aria-modal="true">
    <div class="pwa-install-modal-content">
        <div class="pwa-install-modal-header">
            <h3 class="pwa-install-modal-title" id="pwaModalTitle">
                <i class="bi bi-download"></i>
                Install OpenSell App
            </h3>
            <button type="button" class="pwa-install-modal-close" id="pwaModalClose" aria-label="Close">
                <i class="bi bi-x"></i>
            </button>
        </div>

        <div class="pwa-install-modal-body">
            <div class="pwa-install-intro">
                <p>Get the full OpenSell experience with our app! Enjoy faster loading, offline access, and seamless shopping.</p>
            </div>

            <!--
                THIS is the container renderInstructions() targets via:
                    document.getElementById('installStepsContainer')
                pwa-install-instructions.js will inject the correct platform's
                steps (iOS / Android / Windows / generic) into this div at runtime.

                The previous approach of pre-building all four panel variants
                (iosInstructions, androidInstructions, windowsInstructions,
                genericInstructions) and toggling display:none on them was
                incompatible with modifyExistingModal() → renderInstructions(),
                which always writes to this single container instead.
            -->
            <div id="installStepsContainer"></div>

            <!-- Install Actions
                 modifyExistingModal() hides this entire block for iOS by adding
                 the 'ios-hidden' class and setting display:none directly.
                 For all other platforms it ensures display:flex is set.
            -->
            <div class="pwa-install-actions" id="pwaInstallActions">
                <button type="button" class="pwa-install-btn" id="pwaDirectInstall">
                    <i class="bi bi-download"></i>
                    Install Now
                </button>
                <button type="button" class="pwa-later-btn" id="pwaLaterBtn">
                    Maybe Later
                </button>
            </div>

            <div class="pwa-reminder-settings">
                <label class="pwa-reminder-checkbox">
                    <input type="checkbox" id="pwaNoReminder">
                    Don't show this again today
                </label>
            </div>
        </div>
    </div>
</div>
